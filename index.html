<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tortures Poets Office</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- header dito nakalagay ang logo and buttons -->
    <header class="header">
      <div class="container header-content">
        <a href="/" class="logo" data-router-link>
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15.707 21.293a1 1 0 0 1-1.414 0l-1.586-1.586a1 1 0 0 1 0-1.414l5.586-5.586a1 1 0 0 1 1.414 0l1.586 1.586a1 1 0 0 1 0 1.414z"/>
              <path d="m18 13-1.375-6.874a1 1 0 0 0-.746-.776L3.235 2.028a1 1 0 0 0-1.207 1.207L5.35 15.879a1 1 0 0 0 .776.746L13 18"/>
              <path d="m2.3 2.3 7.286 7.286"/>
              <circle cx="11" cy="11" r="2"/>
            </svg>
          </div>
          <span class="logo-text">ATPO</span>
        </a>
        <!-- when making the website smaller or when in mobile the buttons will become a hamburger menu -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">
        <label for="nav-toggle" class="nav-toggle-label">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </label>
        <!-- the buttons -->
        <nav class="nav">
          <a href="/poems" class="nav-link" data-router-link>Poems</a>
          <a href="/haikus" class="nav-link" data-router-link>Haikus</a>
          <a href="/stories" class="nav-link" data-router-link>Stories</a>
          <a href="/songs" class="nav-link" data-router-link>Songs</a>
        </nav>
      </div>
    </header>

    <main id="main-content"></main>
    <!-- footer ng website nakalagay dito yung copyright and reserved rights -->
    <footer class="footer">
      <div class="container footer-content">
        <p class="footer-text">© 2026 A Tortured Poets Office. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="js/myWritings.js"></script>
  <script src="js/ayokonaaamagjava.js"></script>
  
  <script>
    <!-- Close the navigation menu when a link is clicked -->
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
          document.getElementById('nav-toggle').checked = false;
        });
      });
    });
  </script>
</body>
</html>
